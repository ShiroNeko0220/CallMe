global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "callme-eureka"
    scrape_interval: 5s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["callme-eureka:8761"]

  - job_name: "callme-microservices"
    scrape_interval: 5s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "utilisateur-ms:8081"
          - "cours-ms:8082"
          - "competition-ms:8083"
          - "badge-ms:8084"
          - "presence-ms:8085"
          - "statistiques-ms:8086"