server:
  port: 8086

spring:
  application:
    name: statistiques-ms

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

services:
  presence:
    url: ${SERVICES_PRESENCE_URL:http://localhost:8085}
  cours:
    url: ${SERVICES_COURS_URL:http://localhost:8082}
  competition:
    url: ${SERVICES_COMPETITION_URL:http://localhost:8083}
  utilisateur:
    url: ${SERVICES_UTILISATEUR_URL:http://localhost:8081}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

