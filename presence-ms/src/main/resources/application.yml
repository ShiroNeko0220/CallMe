server:
  port: 8085

spring:
  application:
    name: presence-ms

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    url: jdbc:mysql://localhost:3306/presence_db
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  badge:
    url: http://localhost:8084
  cours:
    url: http://localhost:8082
  utilisateur:
    url: http://localhost:8081