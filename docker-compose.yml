services:
  mysql:
    image: mysql:8.4
    container_name: callme-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - callme-network

volumes:
  mysql_data:

networks:
  callme-network:
    driver: bridge